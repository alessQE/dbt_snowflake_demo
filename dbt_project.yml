name: dbt_data_quality
version: 1.0.0
config-version: 2

profile: dbt_data_quality

model-paths: ["dbt_data_quality/models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_data_quality:
    +materialized: view
    bronze:
      +database: BRONZE
      bronze_customers:
        +schema: customers
      bronze_orders:
        +schema: orders
      bronze_lineitems:
        +schema: items
      bronze_parts:
        +schema: items
    silver:
      +database: SILVER
      silver_customers:
        +schema: customers
      silver_orders:
        +schema: orders
      silver_lineitems:
        +schema: items
      silver_parts:
        +schema: items
    gold:
      +materialized: table
      +database: GOLD
      gold_customer_order_summary:
        +schema: customers
      gold_product_performance:
        +schema: items
