version: 2

models:
  - name: bronze_lineitems
    columns:
      - name: L_ORDERKEY
        data_type: NUMBER(38,0)
        tests:
          - not_null
      - name: L_PARTKEY
        data_type: NUMBER(38,0)
      - name: L_SUPPKEY
        data_type: NUMBER(38,0)
      - name: L_LINENUMBER
        data_type: NUMBER(38,0)
      - name: L_QUANTITY
        data_type: NUMBER(12,2)
      - name: L_EXTENDEDPRICE
        data_type: NUMBER(12,2)
      - name: L_DISCOUNT
        data_type: NUMBER(12,2)
      - name: L_TAX
        data_type: NUMBER(12,2)
      - name: L_RETURNFLAG
        data_type: VARCHAR(1)
      - name: L_LINESTATUS
        data_type: VARCHAR(1)
      - name: L_SHIPDATE
        data_type: DATE
      - name: L_COMMITDATE
        data_type: DATE
      - name: L_RECEIPTDATE
        data_type: DATE
      - name: L_SHIPINSTRUCT
        data_type: VARCHAR(25)
      - name: L_SHIPMODE
        data_type: VARCHAR(10)
      - name: L_COMMENT
        data_type: VARCHAR(44)
