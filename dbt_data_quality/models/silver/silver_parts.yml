version: 2

models:
  - name: silver_parts
    columns:
      - name: part_key
        data_type: NUMBER(38,0)
        tests:
          - not_null
          - unique
      - name: part_name
        data_type: VARCHAR(55)
      - name: manufacturer
        data_type: VARCHAR(25)
      - name: brand
        data_type: VARCHAR(10)
      - name: part_type
        data_type: VARCHAR(25)
      - name: size
        data_type: NUMBER(38,0)
      - name: retail_price
        data_type: NUMBER(12,2)
